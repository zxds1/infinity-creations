<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5A5A40" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/infinity-icon.svg" />
    <link rel="apple-touch-icon" href="/infinity-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <title>Infinity Creations | Design, Print & Brand</title>
    <script>
      (function () {
        var redirect = sessionStorage.getItem('infinity.redirect');
        if (redirect) {
          sessionStorage.removeItem('infinity.redirect');
          history.replaceState(null, '', redirect);
        }
        var theme = localStorage.getItem('infinity.theme') || 'system';
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.classList.toggle('dark', resolved === 'dark');
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
